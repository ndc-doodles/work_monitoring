<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Member Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0a0118, #1e0433);
      color: white;
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">

  <div class="bg-white text-black rounded-xl shadow-lg w-full max-w-md p-8">
    <h2 class="text-2xl font-bold mb-6 text-center text-purple-700">Team Member Login</h2>

    {% if messages %}
      <ul class="mb-4">
        {% for message in messages %}
          <li class="text-red-600 text-sm">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <form method="POST" action="{% url 'teammember_login' %}" class="space-y-4">
      {% csrf_token %}
      <div>
       <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
<input type="text" name="email" id="email" required
       class="mt-1 block w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">

      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" name="password" id="password" required
               class="mt-1 block w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">
      </div>
      <button type="submit"
              class="w-full bg-purple-700 text-white py-2 rounded-md hover:bg-purple-800 transition">Login</button>
    </form>
  </div>

</body>
</html>
